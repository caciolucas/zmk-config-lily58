# Uncomment to enable encoder
# CONFIG_EC11=y
# CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Uncomment the following line to enable the Lily58 OLED Display
# CONFIG_ZMK_DISPLAY=y

CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_STUDIO_LOCKING=n
CONFIG_ZMK_KEYSTATUS_BLE=y

# Supervision timeout: 6s instead of default ~4s
# Gives more tolerance before declaring connection lost on weak signal
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=600

# Zero slave latency: respond on every connection event instead of skipping
# Prevents supervision timeout when keyboard is far from host
# Trade-off: slightly higher power draw
CONFIG_BT_PERIPHERAL_PREF_LATENCY=0
