# Uncomment to enable encoder
# CONFIG_EC11=y
# CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Uncomment the following line to enable the Lily58 OLED Display
# CONFIG_ZMK_DISPLAY=y

# TX power +8dBm for stronger signal between halves and to host
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

CONFIG_ZMK_STUDIO_LOCKING=n
CONFIG_ZMK_KEYSTATUS_BLE=y

# Supervision timeout: 6s instead of default ~4s
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=600

# Experimental BLE improvements — disables 2M PHY (better macOS compat)
# and enables updated LLCP. Most-cited fix for BLE instability on ZMK.
# Planned to become default in a future ZMK release.
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# Disable split battery fetching — known to cause GATT discovery race
# on the right half (issue #3156), making it stop sending keypresses
# until both halves are reset. Disabling also removes the proxy.
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=n
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=n
